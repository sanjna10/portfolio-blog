---
layout: default
---
<article class="project-page">
  <h1>{{ page.title }}</h1>
  {% if page.subtitle %}
    <p class="project-subtitle">{{ page.subtitle }}</p>
  {% endif %}

  {% if page.image %}
    <img class="project-banner" src="{{ page.image | relative_url }}" alt="{{ page.title }}">
  {% endif %}

  {{ content }}
</article>
